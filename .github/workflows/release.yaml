name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        # mathieudutour/github-tag-action — actively maintained, reads PR labels via custom_release_rules
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          # map PR labels to bump type; default to patch if none matched
          custom_release_rules: "major:major,minor:minor,patch:patch"
          default_bump: patch

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

      - name: Update major version tag
        # Keeps the floating tag (e.g. v1) pointing to latest — required because
        # consumers of this Action reference it as ltetzlaff/swift@v1
        run: |
          MAJOR_TAG="v$(echo "${{ steps.tag.outputs.new_version }}" | cut -d. -f1)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "$MAJOR_TAG" -m "Update $MAJOR_TAG to ${{ steps.tag.outputs.new_tag }}"
          git push origin "$MAJOR_TAG" --force
